name: Krishna Reel Bot

on:
workflow_dispatch:

jobs:
run-bot:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: |
      pip install pillow google-generativeai google-auth google-auth-oauthlib google-api-python-client

  - name: Run Script
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: python main.py
```
