steps:
  - uses: actions/checkout@v3

  - uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install ffmpeg
    run: sudo apt update && sudo apt install -y ffmpeg

  - run: pip install pillow google-generativeai google-auth google-auth-oauthlib google-api-python-client

  - name: Run Script
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: python main.py
