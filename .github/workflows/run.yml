name: Krishna Reel Bot

on:
workflow_dispatch:

jobs:
run-bot:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v3

  - uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - run: pip install pillow google-generativeai google-auth google-auth-oauthlib google-api-python-client

  - env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: python main.py
```
